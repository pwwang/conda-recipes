{% set version = '1.4.0' %}

package:
  name: r-sccdc
  version: {{ version|replace("-", "_") }}

source:
  git_url: https://github.com/ZJU-UoE-CCW-LAB/scCDC
  git_rev: 75a3b6190cc360adfa5c650a61cc0be1fa7daaa4 # on Jan 15, 2025

build:
  merge_build_host: True  # [win]
  # If this is a new build for the same version, increment the build number.
  number: 1
  # no skip

  # This is required to make R link correctly on Linux.
  rpaths:
    - lib/R/lib/
    - lib/

# Suggests: testthat, V8
requirements:

  build:
    - r-base
    - r-ddpcr
    - r-dplyr
    - r-ggplot2
    - r-pbapply
    - r-ggrepel
    - r-matrix
    - r-proc
    - r-knitr
    - r-tidyr
    - r-seurat

  run:
    - r-base
    - r-ddpcr
    - r-dplyr
    - r-ggplot2
    - r-pbapply
    - r-ggrepel
    - r-matrix
    - r-proc
    - r-knitr
    - r-seurat

test:
  commands:
    # You can put additional test commands to be run here.
    - $R -e "library('scCDC')"           # [not win]
    - "\"%R%\" -e \"library('scCDC')\""  # [win]

  # You can also put a file called run_test.py, run_test.sh, or run_test.bat
  # in the recipe that will be run at test time.

  # requires:
    # Put any additional test requirements here.

about:
  home: https://github.com/ZJU-UoE-CCW-LAB/scCDC
  license: GPL-3
  summary: scCDC is a computational algorithm developed to detect global contamination-causing genes (GCGs) in single cell and single nuclei RNA-Seq datasets and perform further decontamination (ambient RNA removal) on the GCGs.
  license_family: GPL
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'
